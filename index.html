<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 킥보드 통합 민원 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 카메라 스캔 내부 버튼 디자인 표준화 */
        #reader button {
            background-color: #4f46e5 !important; color: white !important; border: none !important;
            padding: 10px 16px !important; border-radius: 8px !important; font-size: 13px !important;
            font-weight: bold !important; cursor: pointer !important; margin: 5px !important;
        }
        body { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-100 to-indigo-50 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-white p-5 rounded-2xl shadow-xl border border-slate-200 space-y-5 my-auto">
        <div class="text-center">
            <h1 class="text-xl font-black text-indigo-900">🚦 킥보드 불법주차 신고 (App)</h1>
            <p id="subTitleText" class="text-[11px] font-semibold text-indigo-600 mt-1 bg-indigo-50 py-1.5 px-2 rounded-lg">※ 앱 설정에서 카메라 권한을 반드시 허용해 주세요.</p>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button type="button" onclick="switchMode('qr')" id="btnQr" class="p-3 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer">📷 QR 스캔</button>
            <button type="button" onclick="switchMode('manual')" id="btnManual" class="p-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer">⌨️ ID 직접 입력</button>
        </div>

        <form class="space-y-4" onsubmit="event.preventDefault();">
            <div id="qrContainer" class="block"><div id="reader" class="w-full overflow-hidden rounded-xl border border-slate-300 bg-slate-50 p-1 text-center text-xs"></div></div>
            
            <div id="manualContainer" class="hidden">
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">킥보드 고유 ID</label>
                <input type="text" id="scooterId" placeholder="예: GCOO-101, XING-201" class="w-full p-2.5 border border-slate-300 rounded-xl font-mono uppercase text-base focus:outline-indigo-500 bg-slate-50">
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1.5">📍 방치 지역 위치 (택1)</label>
                <div class="grid grid-cols-1 gap-1.5 text-xs">
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="locationGroup" value="일반 보행로(인도)" checked class="w-4 h-4 text-indigo-600"> <span>일반 보행로(인도)</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="locationGroup" value="점자블록 위" class="w-4 h-4 text-indigo-600"> <span class="text-rose-600 font-semibold">점자블록 위</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="locationGroup" value="횡단보도" class="w-4 h-4 text-indigo-600"> <span class="text-rose-600 font-semibold">횡단보도</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="locationGroup" value="버스정류장 앞" class="w-4 h-4 text-indigo-600"> <span>버스정류장 앞</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="locationGroup" value="소화전 앞" class="w-4 h-4 text-indigo-600"> <span>소화전 앞</span></label>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1.5">⚠️ 구체적인 방해 형태 (택1)</label>
                <div class="grid grid-cols-1 gap-1.5 text-xs">
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="obstructionGroup" value="해당 없음 (단순 주차)" checked class="w-4 h-4 text-indigo-600"> <span>해당 없음 (단순 주차)</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="obstructionGroup" value="통행을 완전히 막음 (길막)" class="w-4 h-4 text-indigo-600"> <span class="text-amber-600 font-semibold">통행을 완전히 막음 (길막)</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="obstructionGroup" value="상가/건물 출입구를 막음" class="w-4 h-4 text-indigo-600"> <span>상가/건물 출입구를 막음</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="obstructionGroup" value="골목길 코너 시야 방해" class="w-4 h-4 text-indigo-600"> <span>골목길 코너/모퉁이 시야 방해</span></label>
                    <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer"><input type="radio" name="obstructionGroup" value="차도나 자전거도로 침범" class="w-4 h-4 text-indigo-600"> <span>차도나 자전거도로 침범</span></label>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">📸 현장 사진 첨부</label>
                <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-3 bg-slate-50 text-center">
                    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="uploadPlaceholder"><p class="text-xs font-semibold text-slate-700">갤러리에서 사진 선택</p></div>
                    <img id="imagePreview" class="hidden max-h-24 mx-auto rounded-lg border">
                </div>
            </div>
            
            <button type="button" onclick="submitReport()" class="w-full bg-indigo-600 text-white p-3.5 rounded-xl font-bold text-xs shadow-md cursor-pointer active:bg-indigo-700 transition-colors">신고 접수 및 기사 배정</button>
        </form>
        
        <div id="resultBox" class="mt-3 p-3 rounded-xl bg-slate-900 text-emerald-400 font-mono text-[11px] hidden whitespace-pre-line"></div>
        
        <div id="timelineBox" class="border-t border-slate-100 pt-3 hidden space-y-2">
            <p class="text-[11px] font-bold text-slate-700">📡 실시간 민원 처리 추적</p>
            <div class="flex justify-between items-center text-[10px] relative pt-1">
                <div class="absolute top-4 left-0 right-0 h-0.5 bg-slate-200 z-0"></div>
                <div id="timelineProgress" class="absolute top-4 left-0 h-0.5 bg-indigo-500 z-0 transition-all duration-500" style="width: 0%;"></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step1Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 transition-colors">1</div><span id="step1Text" class="text-slate-400 font-medium">민원 접수</span></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step2Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 transition-colors">2</div><span id="step2Text" class="text-slate-400 font-medium">과태료 부과</span></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step3Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 transition-colors">3</div><span id="step3Text" class="text-slate-400 font-medium">기사 출동</span></div>
            </div>
        </div>
        <div class="text-center pt-1 border-t border-slate-100"><a href="driver.html" class="text-[11px] text-indigo-600 font-bold">🚚 기사용 대시보드로 이동 ➔</a></div>
    </div>

    <script>
        let html5QrcodeScanner = null; let isImageAttached = false;
        const BASE_WEIGHTS = {"일반 보행로(인도)": 2, "점자블록 위": 5, "횡단보도": 5, "버스정류장 앞": 4, "소화전 앞": 4};
        const OBSTRUCTION_BONUS = {"해당 없음 (단순 주차)": 0, "통행을 완전히 막음 (길막)": 4, "상가/건물 출입구를 막음": 3, "골목길 코너 시야 방해": 3, "차도나 자전거도로 침범": 2};
        const last_ride_db = {
            "GCOO-101": {"brand": "지쿠(GCOO)", "user_id": "cau_student1", "region": "내리 대학가 원룸촌", "lat": 37.0101, "lng": 127.2345},
            "XING-201": {"brand": "씽씽", "user_id": "cau_student3", "region": "내리 대학가 원룸촌", "lat": 37.0095, "lng": 127.2360},
            "BEAM-301": {"brand": "빔(BEAM)", "user_id": "cau_delivery", "region": "중앙대 정문 광장", "lat": 37.0118, "lng": 127.2321}
        };

        function switchMode(mode) {
            const qrContainer = document.getElementById('qrContainer'); const manualContainer = document.getElementById('manualContainer');
            const btnQr = document.getElementById('btnQr'); const btnManual = document.getElementById('btnManual');
            
            if (mode === 'qr') { 
                qrContainer.className = "block"; manualContainer.className = "hidden"; 
                btnQr.className = "p-3 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer";
                btnManual.className = "p-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer";
                startQrScanner(); 
            }
            else { 
                qrContainer.className = "hidden"; manualContainer.className = "block"; 
                btnManual.className = "p-3 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer";
                btnQr.className = "p-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer";
                if(html5QrcodeScanner) { html5QrcodeScanner.clear().catch(err=>{}); } 
            }
        }

        function startQrScanner() {
            if (html5QrcodeScanner && html5QrcodeScanner.getState() === 2) return;
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 180 });
            html5QrcodeScanner.render((text) => { document.getElementById('scooterId').value = text.toUpperCase().trim(); switchMode('manual'); });
            
            setTimeout(() => {
                const b1 = document.getElementById('html5-qrcode-button-camera-start');
                const b2 = document.getElementById('html5-qrcode-button-camera-stop');
                const b3 = document.getElementById('html5-qrcode-button-camera-permission');
                if (b3) b3.innerText = "🔒 카메라 권한 체크/허용";
                if (b1) b1.innerText = "📷 카메라 작동 시작";
                if (b2) b2.innerText = "🛑 스캔 정지";
            }, 150);
        }
        window.onload = startQrScanner;

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('imagePreview');
                preview.src = reader.result; preview.classList.remove('hidden');
                document.getElementById('uploadPlaceholder').classList.add('hidden');
                isImageAttached = true;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function submitReport() {
            const scooterId = document.getElementById('scooterId').value.toUpperCase().trim();
            const locationType = document.querySelector('input[name="locationGroup"]:checked').value;
            const obstructionType = document.querySelector('input[name="obstructionGroup"]:checked').value;
            const resultBox = document.getElementById('resultBox');
            if(!scooterId) { alert("고유 ID를 입력해 주세요."); return; }

            const totalDangerScore = (BASE_WEIGHTS[locationType] || 1) + (OBSTRUCTION_BONUS[obstructionType] || 0);
            let brandName = "지쿠(GCOO)"; let fineMessage = ""; let targetRegion = "중앙대 안성캠";
            let lat = 37.0118; let lng = 127.2321;

            // 입력을 기반으로 가상 매칭 프로세스
            if (scooterId in last_ride_db) {
                const ride = last_ride_db[scooterId]; brandName = ride.brand; targetRegion = ride.region; lat = ride.lat; lng = ride.lng;
                fineMessage = `\n🚨 [벌금 부과] 이용자 '${ride.user_id}' -> 과태료 ${(totalDangerScore * 10000).toLocaleString()}원 청구`;
            } else {
                // 시드에 없는 새로운 기기 입력 처리 알고리즘
                if (scooterId.includes("XING") || scooterId.includes("씽씽")) brandName = "씽씽";
                else if (scooterId.includes("BEAM") || scooterId.includes("빔")) brandName = "빔(BEAM)";
                else if (scooterId.includes("SWNG") || scooterId.includes("SWING") || scooterId.includes("스윙")) brandName = "스윙(SWING)";
            }

            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `[SYSTEM APP LOG]\n➔ 소속사: ${brandName}\n➔ 위험 등급합: ${totalDangerScore}점\n➔ 결과: 관제소 전송 완료.` + fineMessage;

            const newTask = { scooter_id: scooterId, brand: brandName, region: targetRegion, location_type: locationType, obstruction_type: obstructionType, danger_score: totalDangerScore, lat: lat, lng: lng, time: new Date().toLocaleTimeString() };
            let currentTasks = JSON.parse(localStorage.getItem(brandName)) || [];
            currentTasks.push(newTask); localStorage.setItem(brandName, JSON.stringify(currentTasks));

            // 타임라인 핸들러 초기화 및 가동
            const bar = document.getElementById('timelineProgress');
            const d1 = document.getElementById('step1Dot'); const d2 = document.getElementById('step2Dot'); const d3 = document.getElementById('step3Dot');
            const t1 = document.getElementById('step1Text'); const t2 = document.getElementById('step2Text'); const t3 = document.getElementById('step3Text');
            
            document.getElementById('timelineBox').classList.remove('hidden');
            d1.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-slate-200";
            d2.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-slate-200";
            d3.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-slate-200";
            t1.className = "text-slate-400 font-medium"; t2.className = "text-slate-400 font-medium"; t3.className = "text-slate-400 font-medium";
            bar.style.width = "0%";

            setTimeout(() => { 
                d1.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-emerald-500"; 
                t1.className = "text-emerald-600 font-bold";
                bar.style.width = "50%"; 
            }, 100);
            
            setTimeout(() => { 
                d2.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-indigo-500"; 
                t2.className = "text-indigo-600 font-bold";
                bar.style.width = "100%"; 
                d3.className = "w-5 h-5 rounded-full text-white flex items-center justify-center font-bold mb-1 transition-colors bg-amber-500";
                t3.className = "text-amber-600 font-bold";
            }, 1500);
        }
    </script>
</body>
</html>
